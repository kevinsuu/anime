services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-backup:
    image: ${BACKUP_IMAGE:-ghcr.io/kevinsuu/anime-db-backup:latest}
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      TZ: Asia/Taipei
    volumes:
      - ./backups/mysql:/backups
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:?APP_URL is required}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      MYLIST_OWNER_EMAIL: ${MYLIST_OWNER_EMAIL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      DEV_AUTH_BYPASS: "false"
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    volumes:
      - backend-storage-public:/app/storage/app/public
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    image: ${SCHEDULER_IMAGE:?SCHEDULER_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:?APP_URL is required}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      MYLIST_OWNER_EMAIL: ${MYLIST_OWNER_EMAIL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      DEV_AUTH_BYPASS: "false"
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    volumes:
      - backend-storage-public:/app/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    restart: unless-stopped
    environment:
      NUXT_API_BASE_URL_INTERNAL: http://backend:8080
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  mysql-data:
  backend-storage-public:
