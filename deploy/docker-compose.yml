services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MYLIST_OWNER_EMAIL: ${MYLIST_OWNER_EMAIL}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_AUTH_BYPASS: "false"
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    image: ${SCHEDULER_IMAGE}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MYLIST_OWNER_EMAIL: ${MYLIST_OWNER_EMAIL}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_AUTH_BYPASS: "false"
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
