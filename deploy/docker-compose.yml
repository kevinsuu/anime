services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_AUTH_BYPASS: "false"
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
      CATALOG_MANUAL_CREATE_ALLOWED_EMAILS: ${CATALOG_MANUAL_CREATE_ALLOWED_EMAILS}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    image: ${SCHEDULER_IMAGE}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_AUTH_BYPASS: "false"
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
      CATALOG_MANUAL_CREATE_ALLOWED_EMAILS: ${CATALOG_MANUAL_CREATE_ALLOWED_EMAILS}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend
      - frontend

volumes:
  mysql-data:
  certbot-etc:
  certbot-www:
