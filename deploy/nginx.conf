# Reverse proxy for anime.kaistarstudio.me
# Routes / to the frontend static site container and /api/* to the
# backend Laravel container, stripping the /api prefix since the
# Laravel routes themselves are unprefixed (apiPrefix: '').
#
# Assumes both containers are reachable on the same docker network
# under the service names `frontend` and `backend`.

server {
    listen 80;
    server_name anime.kaistarstudio.me;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name anime.kaistarstudio.me;

    ssl_certificate     /etc/letsencrypt/live/anime.kaistarstudio.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anime.kaistarstudio.me/privkey.pem;

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
