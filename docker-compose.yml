services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE}
      SESSION_DRIVER: ${SESSION_DRIVER}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MYLIST_OWNER_EMAIL: ${MYLIST_OWNER_EMAIL}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS}
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend-vendor:/app/vendor
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL}
      NUXT_API_BASE_URL_INTERNAL: http://backend:8080
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      NUXT_PUBLIC_ENABLE_DEV_LOGIN: ${NUXT_PUBLIC_ENABLE_DEV_LOGIN}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

  scheduler:
    build:
      context: ./backend
    command: sh -c "php artisan schedule:work"
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE}
      SESSION_DRIVER: ${SESSION_DRIVER}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MYLIST_OWNER_EMAIL: ${MYLIST_OWNER_EMAIL}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS}
      BANGUMI_API_BASE_URL: ${BANGUMI_API_BASE_URL}
      BANGUMI_USER_AGENT: ${BANGUMI_USER_AGENT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    volumes:
      - ./backend:/app
      - backend-vendor:/app/vendor
    depends_on:
      mysql:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:5
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  backend-vendor:
  frontend-node-modules:
