services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: anime_tracker
      MYSQL_USER: anime
      MYSQL_PASSWORD: anime_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/database/migrations/001_init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/20-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: anime_tracker
      DB_USER: anime
      DB_PASSWORD: anime_password
      JWT_SECRET: local-dev-change-this-secret
      JWT_TTL_SECONDS: 3600
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_ORIGINS: http://localhost:5173
      DEV_AUTH_BYPASS: "true"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      VITE_ENABLE_DEV_LOGIN: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:5
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
