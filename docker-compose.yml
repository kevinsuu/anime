services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: anime_tracker
      MYSQL_USER: anime
      MYSQL_PASSWORD: anime_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: AnimeTracker
      APP_ENV: local
      APP_KEY: base64:SvqiJHNzmqzb2P4GkXwQNDqU6pMDecKto2Xrdk6yTJY=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: anime_tracker
      DB_USERNAME: anime
      DB_PASSWORD: anime_password
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: local-dev-change-this-secret
      JWT_TTL_SECONDS: 3600
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_ORIGINS: http://localhost:3000
      DEV_AUTH_BYPASS: "true"
      BANGUMI_API_BASE_URL: https://api.bgm.tv
      BANGUMI_USER_AGENT: anime-tracker/1.0
      HTTP_TIMEOUT_SECONDS: 10
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend-vendor:/app/vendor
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      NUXT_PUBLIC_ENABLE_DEV_LOGIN: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:5
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  backend-vendor:
  frontend-node-modules:
