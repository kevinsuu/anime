name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        working-directory: backend
        run: php artisan test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (verifies the production build succeeds)
        working-directory: frontend
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE_URL: https://anime.kaistarstudio.me/api
          NUXT_PUBLIC_GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.production
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build scheduler image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.scheduler
          push: false
          cache-from: type=gha,scope=scheduler
          cache-to: type=gha,mode=max,scope=scheduler

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NUXT_PUBLIC_API_BASE_URL=https://anime.kaistarstudio.me/api
            NUXT_PUBLIC_GOOGLE_CLIENT_ID=ci-placeholder.apps.googleusercontent.com
