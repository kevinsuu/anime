name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: kevinsuu

permissions: {}

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match v<major>.<minor>.<patch>." >&2
            exit 1
          fi

  build-and-push:
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: anime-backend
            context: backend
            file: backend/Dockerfile.production
            scope: backend
          - image: anime-scheduler
            context: backend
            file: backend/Dockerfile.scheduler
            scope: scheduler
          - image: anime-frontend
            context: frontend
            file: frontend/Dockerfile
            scope: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        if: matrix.image != 'anime-frontend'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest

      - name: Build and push frontend
        if: matrix.image == 'anime-frontend'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
          build-args: |
            NUXT_PUBLIC_API_BASE_URL=https://anime.kaistarstudio.me/api
            NUXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NUXT_PUBLIC_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,RELEASE_TAG
          script: |
            set -e
            # Pasted secrets may retain CR/LF and turn an otherwise valid path
            # into a different directory name on the remote host.
            DEPLOY_PATH="$(printf '%s' "${DEPLOY_PATH:-}" | tr -d '\r\n')"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH is empty after removing line breaks." >&2
              exit 1
            fi
            case "$DEPLOY_PATH" in
              /*) ;;
              *) echo "DEPLOY_PATH must be an absolute path." >&2; exit 1 ;;
            esac
            cd -- "$DEPLOY_PATH"
            touch .env
            set_env_var() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                echo "${key}=${value}" >> .env
              fi
            }
            set_env_var BACKEND_IMAGE "ghcr.io/kevinsuu/anime-backend:${RELEASE_TAG}"
            set_env_var SCHEDULER_IMAGE "ghcr.io/kevinsuu/anime-scheduler:${RELEASE_TAG}"
            set_env_var FRONTEND_IMAGE "ghcr.io/kevinsuu/anime-frontend:${RELEASE_TAG}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
